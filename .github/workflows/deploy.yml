name: Deploy Luxora

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unpack uploaded project zip if needed
        shell: bash
        run: |
          if [ ! -d "frontend" ] || [ ! -d "backend" ]; then
            ZIP_FILE="$(ls luxora-*-build-verified.zip 2>/dev/null | head -n 1 || true)"
            if [ -z "$ZIP_FILE" ]; then
              echo "No frontend/backend folders and no luxora zip found."
              exit 1
            fi
            echo "Unpacking $ZIP_FILE"
            unzip -o "$ZIP_FILE"
          fi
          test -d frontend
          test -d backend

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Typecheck backend
        working-directory: backend
        run: npm run typecheck

      - name: Apply D1 migrations
        working-directory: backend
        run: npx wrangler d1 migrations apply luxora_db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        working-directory: backend
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
