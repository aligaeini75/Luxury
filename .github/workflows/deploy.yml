name: Deploy Luxora

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DB_NAME: luxora_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract uploaded Luxora package
        shell: bash
        run: |
          if [ ! -d frontend ] || [ ! -d backend ]; then
            ZIP=$(find . -maxdepth 1 -name 'luxora-*.zip' | head -n 1)
            if [ -z "$ZIP" ]; then
              echo 'No Luxora zip found.'
              exit 1
            fi
            unzip -o "$ZIP"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify frontend tools
        working-directory: frontend
        shell: bash
        run: |
          pnpm exec vue-tsc --version
          pnpm exec vite --version

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Verify backend tools
        working-directory: backend
        shell: bash
        run: |
          pnpm exec wrangler --version
          pnpm exec tsc --version

      - name: Ensure D1 exists
        working-directory: backend
        shell: bash
        run: |
          pnpm exec wrangler d1 list --json > dbs.json
          DB_ID=$(node -e "const fs=require('fs');const dbs=JSON.parse(fs.readFileSync('dbs.json','utf8'));const db=(Array.isArray(dbs)?dbs:dbs.result||[]).find(d=>d.name==='luxora_db');console.log(db?.uuid||db?.id||'')")

          if [ -z "$DB_ID" ]; then
            echo 'Creating D1 database...'
            CREATE_OUTPUT=$(pnpm exec wrangler d1 create luxora_db)
            echo "$CREATE_OUTPUT"
            DB_ID=$(echo "$CREATE_OUTPUT" | grep -oE '[0-9a-fA-F-]{36}' | head -n 1)
          fi

          echo "DB_ID=$DB_ID" >> $GITHUB_ENV

      - name: Patch wrangler.toml
        working-directory: backend
        shell: bash
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const dbId = process.env.DB_ID
          let t = fs.readFileSync('wrangler.toml','utf8')

          if (/database_id\s*=\s*".*"/.test(t)) {
            t = t.replace(/database_id\s*=\s*".*"/, `database_id = "${dbId}"`)
          }

          if (!/database_name\s*=\s*"luxora_db"/.test(t)) {
            t += `\n[[d1_databases]]\nbinding = "DB"\ndatabase_name = "luxora_db"\ndatabase_id = "${dbId}"\n`
          }

          fs.writeFileSync('wrangler.toml', t)
          console.log(t)
          NODE

      - name: Run migrations
        working-directory: backend
        run: pnpm exec wrangler d1 migrations apply luxora_db --remote

      - name: Deploy worker
        working-directory: backend
        run: pnpm exec wrangler deploy
